
<!doctype html>
<html lang="vi" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>7AM News Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Ubuntu:wght@400;500&family=Ubuntu+Mono:wght@400;500&display=swap" rel="stylesheet">
<!-- Enterprise: Oswald headlines + Ubuntu body, deep navy + blue accent -->
<style>
/* ============================== TOKENS ============================== */
:root{
  /* Enterprise — clean navy/blue, Oswald display + Ubuntu body, high-contrast slate */
  --bg:#f8fafc; --surface:#ffffff; --panel:#eef2f7;
  --fg:#0f172a; --muted:#64748b; --faint:#94a3b8;
  --border:#d8dee8; --border2:#edf1f6;
  --primary:#1d4ed8;  /* enterprise blue */
  --hot:#b91c1c;
  --tech:#1d4ed8; --science:#15803d; --news:#64748b; --biz:#b45309; --world:#1d4ed8;
  --shadow:0 0 0 1px var(--border);
  --shadow-deep:0 20px 52px rgba(15,23,42,.10);
  --font:"Ubuntu",system-ui,-apple-system,sans-serif;
  --font-display:"Oswald","Ubuntu",system-ui,sans-serif;
}
html[data-theme="dark"]{
  --bg:#0f172a; --surface:#1e293b; --panel:#334155;
  --fg:#f1f5f9; --muted:#94a3b8; --faint:#64748b;
  --border:rgba(241,245,249,.15); --border2:rgba(241,245,249,.09);
  --primary:#60a5fa;
  --shadow:0 0 0 1px rgba(241,245,249,.15);
  --shadow-deep:0 20px 52px rgba(0,0,0,.4);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:var(--font);background:var(--bg);color:var(--fg);-webkit-font-smoothing:antialiased;overflow:hidden}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
a{color:inherit;text-decoration:none}
.tnum{font-variant-numeric:tabular-nums}
.brand,.feed-title h1,.row-title,.feat-title,.reader-title,.mgr-title{font-family:var(--font-display)}
.row-title,.feat-title{font-weight:600;letter-spacing:.01em}
.feed-title h1{font-weight:600;letter-spacing:.02em;text-transform:uppercase}
.row-sum,.feat-sum{font-family:var(--font);font-weight:400}
.s-label,.t-label{letter-spacing:.12em}
.mgr-title{font-weight:600;letter-spacing:.04em;text-transform:uppercase}

/* ============================== SHELL ============================== */
.hub{height:100dvh;display:grid;grid-template-rows:auto 1fr}

/* ---------- topbar ---------- */
.top{display:flex;align-items:center;gap:16px;padding:0 20px;height:56px;
  background:var(--surface);border-bottom:1px solid var(--border);z-index:20}
.brand{display:flex;align-items:center;gap:9px;font-weight:600;font-size:13px;letter-spacing:.08em;text-transform:uppercase;flex:0 0 auto}
.brand .mark{width:30px;height:30px;border-radius:6px;background:var(--primary);color:#fff;
  display:grid;place-items:center;font-size:11px;font-weight:700;letter-spacing:.06em}
.brand .am{color:var(--primary)}
.search{flex:1;max-width:520px;position:relative}
.search input{width:100%;height:38px;border-radius:6px;background:var(--bg);border:1px solid var(--border);
  padding:0 14px 0 38px;font:inherit;font-size:14px;color:var(--fg)}
.search input::placeholder{color:var(--faint)}
.search input:focus{outline:none;border-color:var(--primary);background:var(--surface);box-shadow:0 0 0 3px rgba(29,78,216,.18)}
.search svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:17px;height:17px;color:var(--faint)}
.top-spacer{flex:1}
.tabs{display:flex;gap:2px;background:transparent;border:1px solid var(--border);border-radius:6px;padding:3px}
.tab{padding:6px 14px;border-radius:4px;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
.tab[data-on="1"]{background:var(--primary);color:#fff;box-shadow:none}
.iconbtn{width:36px;height:36px;border-radius:6px;display:grid;place-items:center;color:var(--muted);border:1px solid var(--border);background:var(--surface)}
.iconbtn:hover{background:var(--panel);color:var(--fg)}
.iconbtn svg{width:18px;height:18px}

/* ---------- 3-col body ---------- */
.body{display:grid;grid-template-columns:264px minmax(0,1fr) 320px;min-height:0}
.col{min-height:0;overflow-y:auto;scrollbar-width:thin}
.col::-webkit-scrollbar{width:8px}
.col::-webkit-scrollbar-thumb{background:var(--border);border-radius:8px}

/* ---------- left: sources ---------- */
.sources{background:var(--surface);border-right:1px solid var(--border);padding:14px 12px}
.s-group{margin-bottom:18px}
.s-label{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);
  padding:6px 10px}
.s-link{display:flex;align-items:center;gap:10px;width:100%;padding:8px 10px;border-radius:4px;
  font-size:13px;font-weight:400;color:var(--muted);text-align:left;transition:.15s;letter-spacing:0;text-transform:none}
.s-link:hover{background:var(--panel);color:var(--fg)}
.s-link[data-on="1"]{background:color-mix(in oklab,var(--primary) 10%,var(--surface));color:var(--primary);box-shadow:0 0 0 1px var(--border)}
.s-dot{width:9px;height:9px;border-radius:50%;flex:0 0 auto}
.s-ico{width:17px;height:17px;flex:0 0 auto;color:var(--faint)}
.s-favi{width:17px;height:17px;border-radius:6px;flex:0 0 auto;object-fit:cover;background:var(--panel)}
.s-link[data-on="1"] .s-ico{color:var(--primary)}
.s-name{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.s-count{font-size:12px;font-weight:500;color:var(--faint);min-width:18px;text-align:right;font-variant-numeric:tabular-nums}
.s-link[data-on="1"] .s-count{color:var(--primary)}

/* ---------- center: feed ---------- */
.feedcol{background:var(--bg);padding:0 26px}
/* cap reading content on very wide screens; background still spans full column */
.feed-head,.list{max-width:820px;margin-inline:auto}
.feed-foot{max-width:820px;margin:4px auto 40px;padding:22px 2px 0;border-top:1px solid var(--border2);
  font-size:12.5px;color:var(--faint);line-height:1.65}
.feed-foot .ff-brand{font-weight:600;font-family:var(--font-display);color:var(--muted);font-size:14px;margin-bottom:7px}
.feed-foot .ff-brand span{color:var(--primary)}
.feed-foot .ff-row{display:flex;gap:16px;flex-wrap:wrap;align-items:center;margin-top:12px}
.feed-foot button{font-size:12.5px;font-weight:500;color:var(--muted)}
.feed-foot button:hover{text-decoration:underline}
.feed-head{position:sticky;top:0;background:linear-gradient(var(--bg) 78%,transparent);
  padding:22px 0 10px;z-index:5}
.feed-title{display:flex;align-items:baseline;gap:12px}
.feed-title h1{font-size:26px}
.feed-title .cnt{font-size:13px;color:var(--muted);font-weight:400;font-family:var(--font)}
.feed-tools{display:flex;align-items:center;gap:8px;margin-top:14px;flex-wrap:wrap}
.chip{padding:4px 12px;border-radius:4px;font-size:11px;font-weight:600;background:transparent;
  border:1px solid var(--border);color:var(--muted);transition:.15s;text-transform:uppercase;letter-spacing:.05em}
.chip:hover{background:var(--panel);color:var(--fg)}
.chip[data-on="1"]{background:color-mix(in oklab,var(--primary) 10%,var(--surface));border-color:rgba(29,78,216,.35);color:var(--primary)}
.chip .c-dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:6px;vertical-align:middle}

.list{padding:6px 0 30px;display:flex;flex-direction:column}
.row{display:flex;gap:13px;padding:17px 6px;border-bottom:1px solid var(--border2);cursor:pointer;transition:background .15s}
.row:hover{background:var(--surface)}
.unread{width:7px;height:7px;border-radius:50%;background:var(--primary);flex:0 0 auto;margin-top:8px}
.row.read .unread{background:transparent;border:1px solid var(--border)}
.row.read .row-title{color:var(--muted);font-weight:600}
.row-main{flex:1;min-width:0}
.row-meta{display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--muted);margin-bottom:5px}
.row-meta .src-favi{width:16px;height:16px;border-radius:4px;flex:0 0 auto;object-fit:cover;background:var(--panel)}
.row-thumb{width:100px;height:72px;border-radius:6px;flex:0 0 auto;align-self:center;
  background-size:cover;background-position:center;background-color:var(--panel);overflow:hidden;border:1px solid var(--border)}
.row-thumb.ph{display:grid;place-items:center;
  background:repeating-linear-gradient(45deg,color-mix(in srgb,var(--fg) 4%,var(--bg)) 0 12px,color-mix(in srgb,var(--fg) 8%,var(--bg)) 12px 24px)}
.row-thumb.ph svg{width:26px;height:26px;color:color-mix(in srgb,var(--fg) 20%,transparent)}
@media(max-width:560px){ .row-thumb{width:78px;height:62px} }
.row-meta .src-name{font-weight:600;color:var(--fg)}
.row-meta .sep{color:var(--faint)}
.row-title{font-size:16px;line-height:1.38;letter-spacing:-.01em;text-wrap:pretty}
.row-sum{font-size:13.5px;color:var(--muted);line-height:1.62;margin-top:5px;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.row-foot{display:flex;align-items:center;gap:8px;margin-top:10px}
.tag{font-size:10px;font-weight:600;padding:2px 7px;border-radius:3px;
  background:color-mix(in oklab,var(--primary) 10%,var(--bg));border:none;color:var(--primary);letter-spacing:.08em;text-transform:uppercase}
.row-act{margin-left:auto;font-size:12.5px;font-weight:500;color:var(--muted);padding:5px 10px;border-radius:8px}
.row-act+.row-act{margin-left:6px}
.row-act:hover{background:var(--panel);color:var(--fg)}
.row-act.on{color:var(--primary)}
.row-act svg{width:14px;height:14px;vertical-align:-2px}

/* ---------- right: trending ---------- */
.trend{background:var(--surface);border-left:1px solid var(--border);padding:20px 18px}
.t-label{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);margin:6px 2px 12px;
  display:flex;align-items:center;gap:7px}
.t-label .pulse{width:7px;height:7px;border-radius:50%;background:var(--primary);opacity:.55}
.feat{border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:20px;cursor:pointer;transition:.2s}
.feat:hover{box-shadow:var(--shadow-deep);border-color:transparent}
.feat-img{aspect-ratio:16/9;display:grid;place-items:center;
  background:repeating-linear-gradient(45deg,color-mix(in srgb,var(--fg) 4%,var(--surface)) 0 14px,color-mix(in srgb,var(--fg) 8%,var(--surface)) 14px 28px)}
.feat-img svg{width:38px;height:38px;color:color-mix(in srgb,var(--fg) 20%,transparent)}
.feat-body{padding:14px 15px 16px}
.feat-cat{font-size:11.5px;font-weight:600;display:flex;align-items:center;gap:6px;margin-bottom:7px}
.feat-cat .s-dot{width:8px;height:8px}
.feat-title{font-size:15.5px;line-height:1.38;letter-spacing:-.01em}
.feat-sum{font-size:12.5px;color:var(--muted);line-height:1.62;margin-top:7px;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.topic{display:flex;align-items:center;gap:10px;padding:9px 4px}
.topic .t-name{font-size:13.5px;font-weight:400;flex:1}
.topic .t-bar{height:4px;border-radius:4px;background:color-mix(in oklab,var(--primary) 28%,transparent);min-width:4px}
.topic .t-num{font-size:12px;font-weight:600;color:var(--faint);min-width:20px;text-align:right;font-variant-numeric:tabular-nums}

/* ---------- loader / toast ---------- */
.loader{position:fixed;inset:56px 0 0;z-index:30;display:none;flex-direction:column;align-items:center;justify-content:center;gap:14px;background:var(--bg);color:var(--muted)}
.loader.show{display:flex}
.spinner{width:32px;height:32px;border-radius:50%;border:3px solid var(--border);border-top-color:var(--primary);animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{animation:spin .8s linear infinite}
.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);z-index:60;max-width:520px;
  background:var(--surface);color:var(--fg);border:1px solid var(--border);padding:12px 20px;border-radius:6px;font-size:13px;font-weight:500;letter-spacing:0;line-height:1.45;text-align:center;
  opacity:0;visibility:hidden;transition:.3s;box-shadow:var(--shadow-deep)}
.toast.show{opacity:1;visibility:visible}
.empty{padding:60px 20px;text-align:center;color:var(--muted);font-size:14px}

/* ---------- reader modal (AI summary / original) ---------- */
.reader-scrim{position:fixed;inset:0;background:rgba(15,23,42,.35);z-index:70;opacity:0;visibility:hidden;transition:.2s}
.reader-scrim.open{opacity:1;visibility:visible}
.reader{position:fixed;z-index:80;left:50%;top:50%;transform:translate(-50%,-47%) scale(.98);
  width:min(680px,93vw);max-height:88vh;overflow-y:auto;background:var(--surface);border:1px solid var(--border);
  border-radius:8px;box-shadow:var(--shadow-deep);opacity:0;visibility:hidden;transition:.22s}
.reader.open{opacity:1;visibility:visible;transform:translate(-50%,-50%) scale(1)}
.reader::-webkit-scrollbar{width:8px}.reader::-webkit-scrollbar-thumb{background:var(--border);border-radius:8px}
.reader-inner{padding:22px 26px 26px}
.reader-top{display:flex;align-items:center;gap:9px;margin-bottom:16px}
.reader-top .src-favi{width:18px;height:18px;border-radius:5px;object-fit:cover;background:var(--panel)}
.reader-top .src-name{font-weight:600;font-size:13.5px}
.reader-top .sep{color:var(--faint)}
.reader-top .row-time{font-size:13px;color:var(--muted)}
.reader-close{margin-left:auto;width:34px;height:34px;border-radius:4px;display:grid;place-items:center;color:var(--muted)}
.reader-close:hover{background:var(--panel);color:var(--fg)}
.reader-close svg{width:18px;height:18px}
.reader-title{font-size:24px;font-weight:600;line-height:1.2;letter-spacing:.02em;text-transform:uppercase;margin-bottom:16px}
.reader-thumb{width:100%;aspect-ratio:16/9;border-radius:6px;background-size:cover;background-position:center;
  background-color:var(--panel);margin-bottom:18px;border:1px solid var(--border)}
.reader-thumb.ph{display:grid;place-items:center;
  background:repeating-linear-gradient(45deg,color-mix(in srgb,var(--fg) 4%,var(--surface)) 0 14px,color-mix(in srgb,var(--fg) 8%,var(--surface)) 14px 28px)}
.reader-thumb.ph svg{width:34px;height:34px;color:color-mix(in srgb,var(--fg) 20%,transparent)}
.reader-tabs{display:inline-flex;background:transparent;border:1px solid var(--border);border-radius:5px;padding:3px;margin-bottom:18px}
.reader-tab{padding:7px 16px;border-radius:3px;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
.reader-tab[data-on="1"]{background:var(--primary);color:#fff;box-shadow:none}
.reader-pane{display:none}
.reader-pane[data-on="1"]{display:block}
.ai-badge{display:inline-flex;align-items:center;gap:7px;font-size:10px;font-weight:600;color:var(--primary);
  background:color-mix(in oklab,var(--primary) 10%,var(--surface));border:none;padding:4px 10px;border-radius:3px;margin-bottom:14px;letter-spacing:.08em;text-transform:uppercase}
.ai-badge svg{width:12px;height:12px}
.ai-badge .ai-note{font-weight:400;color:var(--muted)}
.reader-lead{font-size:16px;line-height:1.7;color:var(--fg)}
.reader-points{margin:16px 0 0;padding-left:18px;display:flex;flex-direction:column;gap:9px}
.reader-points li{font-size:14.5px;line-height:1.62;color:var(--muted)}
.origin-note{font-size:14px;color:var(--muted);line-height:1.65;margin-bottom:18px}
.btn-primary{display:inline-flex;align-items:center;gap:8px;background:var(--primary);color:#fff;font-weight:600;font-size:12px;padding:9px 18px;border-radius:6px;border:none;letter-spacing:.06em;text-transform:uppercase;transition:.15s}
.btn-primary:hover{background:color-mix(in oklab,var(--primary),black 10%)}
.btn-primary svg{width:15px;height:15px}
.reader-foot{display:flex;align-items:center;gap:8px;margin-top:24px;padding-top:16px;border-top:1px solid var(--border2)}
.reader-foot .row-act{margin:0}
.article p{font-size:15.5px;line-height:1.75;color:var(--fg);margin-bottom:14px}
.article p:first-of-type{font-size:16.5px}
.demo-flag{font-size:12.5px;font-weight:500;color:var(--hot);background:color-mix(in srgb,var(--hot) 10%,transparent);
  padding:8px 12px;border-radius:8px;margin-bottom:18px}
.art-loading{display:flex;flex-direction:column;align-items:center;gap:12px;padding:46px 0;color:var(--muted);font-size:13.5px}
.reader-cta{display:inline-block;margin-top:6px;font-size:13.5px;font-weight:600;color:var(--primary)}

/* ---------- feed manager ---------- */
.s-manage{font-size:10px;font-weight:600;color:var(--faint);text-transform:uppercase;letter-spacing:.08em;padding:3px 8px;border-radius:6px;border:1px solid transparent}
.s-manage:hover{background:var(--panel);color:var(--fg);border-color:var(--border)}
.mgr-title{font-size:17px;font-weight:700}
.mgr-list{display:flex;flex-direction:column;gap:7px;margin-bottom:22px;max-height:42vh;overflow-y:auto;padding-right:4px}
.mgr-list::-webkit-scrollbar{width:8px}
.mgr-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:8px}
.mgr-empty{color:var(--muted);font-size:13.5px;padding:14px 2px}
.mgr-row{display:flex;align-items:center;gap:11px;padding:10px 12px;border:1px solid var(--border);border-radius:6px}
.mgr-row .s-dot{width:10px;height:10px;border-radius:50%;flex:0 0 auto}
.mgr-meta{flex:1;min-width:0}
.mgr-label{font-size:14px;font-weight:600}
.mgr-url{font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mgr-act{width:32px;height:32px;border-radius:8px;display:grid;place-items:center;color:var(--muted);flex:0 0 auto}
.mgr-act:hover{background:var(--panel);color:var(--fg)}
.mgr-act.del:hover{color:var(--hot);background:color-mix(in srgb,var(--hot) 10%,transparent)}
.mgr-act svg{width:16px;height:16px}
.mgr-form{border-top:1px solid var(--border2);padding-top:18px;display:flex;flex-direction:column;gap:10px}
.mgr-form-title{font-size:14px;font-weight:600}
.mgr-hint{font-size:12.5px;color:var(--muted);line-height:1.5;margin:-2px 0 2px}
.mgr-form input,.mgr-form select{height:40px;border-radius:6px;border:1px solid var(--border);
  background:var(--bg);padding:0 12px;font:inherit;font-size:14px;color:var(--fg);width:100%}
.mgr-form input:focus,.mgr-form select:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(29,78,216,.18)}
.mgr-form-actions{display:flex;gap:12px;align-items:center;margin-top:2px}
.mgr-cancel{font-size:13.5px;font-weight:500;color:var(--muted)}
@media(max-width:560px){ .reader-title{font-size:20px} .reader-inner{padding:18px 18px 22px} }

/* ---------- responsive ---------- */
.menu-btn{display:none}
@media(max-width:1140px){ .body{grid-template-columns:240px minmax(0,1fr)} .trend{display:none} }
@media(max-width:820px){
  .body{grid-template-columns:1fr}
  .sources{position:fixed;top:56px;bottom:0;left:0;width:280px;z-index:25;transform:translateX(-100%);transition:transform .25s}
  .sources.open{transform:translateX(0);box-shadow:var(--shadow-deep)}
  .menu-btn{display:grid}
  .search{max-width:none}
  .tabs{display:none}
  .feedcol{padding:0 16px}
}
</style>
</head>
<body>
<div class="hub">

  <!-- topbar -->
  <header class="top">
    <button class="iconbtn menu-btn" id="menuBtn" aria-label="Nguồn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 6h18M3 12h18M3 18h18"/></svg></button>
    <div class="brand"><span class="mark">7A</span><span>7<span class="am">AM</span> Hub</span></div>
    <div class="search">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>
      <input id="search" type="search" placeholder="Tìm tiêu đề, chủ đề, nguồn…">
    </div>
    <span class="top-spacer"></span>
    <div class="tabs">
      <button class="tab" data-tab="all" data-on="1">Dòng tin</button>
      <button class="tab" data-tab="saved">Đã lưu</button>
    </div>
    <button class="iconbtn refresh-btn" aria-label="Tải lại"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-2.64-6.36M21 3v6h-6"/></svg></button>
    <button class="iconbtn theme-btn" aria-label="Giao diện">
      <svg class="ic-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>

<script>
/* ============================== SOURCES + CATEGORIES ============================== */
// Each source = one RSS feed mapped to a category. Add more by pushing here.
const DEFAULT_SOURCES = [
  { id:'tg', label:'VnExpress · Thế giới',   cat:'world',   url:'https://vnexpress.net/rss/the-gioi.rss' },
  { id:'sh', label:'VnExpress · Số hóa',      cat:'tech',    url:'https://vnexpress.net/rss/so-hoa.rss' },
  { id:'kd', label:'VnExpress · Kinh doanh',  cat:'biz',     url:'https://vnexpress.net/rss/kinh-doanh.rss' },
  { id:'kh', label:'VnExpress · Khoa học',    cat:'science', url:'https://vnexpress.net/rss/khoa-hoc.rss' },
  { id:'ts', label:'VnExpress · Thời sự',     cat:'news',    url:'https://vnexpress.net/rss/thoi-su.rss' },
];
// user-managed feed list (persisted) — falls back to defaults
let SOURCES = (()=>{ try{ const s=JSON.parse(localStorage.getItem('hub.feeds'));
  if(Array.isArray(s)&&s.length) return s; }catch(e){} return DEFAULT_SOURCES.slice(); })();
function saveSources(){ localStorage.setItem('hub.feeds', JSON.stringify(SOURCES)); }
const CAT = {
  world:  {label:'Thế giới'},  tech:{label:'Công nghệ'},
  science:{label:'Khoa học'},  news:{label:'Thời sự'}, biz:{label:'Kinh doanh'},
};
const catColor = {world:'var(--world)',tech:'var(--tech)',science:'var(--science)',news:'var(--news)',biz:'var(--biz)'};

// AI auto-classification stub — assigns a category per article (keyword heuristic now).
// Swap for a real LLM/zero-shot classifier later; feeds no longer carry a manual category.
const CAT_KEYWORDS={
  tech:['ai',' gpt','iphone','samsung','google','phần mềm','ứng dụng','chip','công nghệ','máy tính','robot','smartphone','laptop'],
  biz:['kinh tế','kinh doanh','doanh nghiệp','thị trường','chứng khoán','giá ','usd','ngân hàng','lạm phát','xuất khẩu','đầu tư','lợi nhuận'],
  science:['khoa học','nghiên cứu','vũ trụ','nasa','tế bào','gen ','thí nghiệm','phát hiện','sao hỏa','khí hậu'],
  news:['việt nam','hà nội','tp hcm','công an','chính phủ','bộ ','quốc hội','tai nạn','thời tiết','học sinh','giao thông'],
  world:['mỹ','trung quốc','nga','ukraine','châu âu','quốc tế','tổng thống','israel','liên hợp quốc']
};
function aiClassify(a){
  const t=((a.title||'')+' '+(a.summary||'')).toLowerCase();
  let best='world', bestN=0;
  for(const [cat,kws] of Object.entries(CAT_KEYWORDS)){
    const n=kws.reduce((c,k)=>c+(t.includes(k)?1:0),0);
    if(n>bestN){ bestN=n; best=cat; }
  }
  return best;
}
const srcById = id => SOURCES.find(s=>s.id===id);
function faviconUrl(src){ let host='vnexpress.net'; try{ host=new URL(src.url).hostname; }catch(e){}
  return `https://www.google.com/s2/favicons?sz=64&domain=${host}`; }

// keyword set for honest tag/topic extraction (only shown when present in a title)
const KEYWORDS = ['AI','GPT','OpenAI','Anthropic','Google','Apple','iPhone','Tesla','Nvidia','Bitcoin','Trump','Trung Quốc','Mỹ','Việt Nam'];

/* offline fallback if every feed fails */
const SAMPLE = [
  {id:'s1',sourceId:'tg',cat:'world',title:"Làn sóng nhân tài AI từ Mỹ 'chảy' về Trung Quốc xây AGI",summary:"Trung Quốc thay đổi chiến lược từ ứng dụng AI sang AGI và siêu ứng dụng với nhân tài thu hút từ Mỹ.",time:'2 giờ trước',ts:Date.now()-72e5,url:'https://vnexpress.net'},
  {id:'s2',sourceId:'sh',cat:'tech',title:"Nhà sáng lập NotebookLM: 'AI để cùng động não, không phải để viết thay'",summary:"Steven Johnson cho rằng AI phải thấu hiểu phong cách cá nhân để hỗ trợ, thay vì tạo nội dung rập khuôn.",time:'3 giờ trước',ts:Date.now()-108e5,url:'https://vnexpress.net'},
  {id:'s3',sourceId:'kh',cat:'science',title:"Nhà khoa học Harvard muốn thử nghiệm thuốc 'cải lão hoàn đồng'",summary:"David Sinclair dự định thử nghiệm thuốc trẻ hóa toàn thân dựa trên tái lập trình hóa học.",time:'7 giờ trước',ts:Date.now()-252e5,url:'https://vnexpress.net'},
  {id:'s4',sourceId:'kd',cat:'biz',title:"UOB: Nền kinh tế Việt Nam 'bền bỉ'",summary:"Kinh tế Việt Nam bền bỉ trước áp lực chi phí và căng thẳng bên ngoài, theo UOB.",time:'11 giờ trước',ts:Date.now()-396e5,url:'https://vnexpress.net'},
  {id:'s5',sourceId:'ts',cat:'news',title:"Đề xuất thanh tra đột xuất cơ sở thực phẩm không cần báo trước",summary:"Bộ Công an đề xuất thanh tra không báo trước, phong tỏa kho bãi và thu hồi sản phẩm trong 24 giờ.",time:'9 giờ trước',ts:Date.now()-324e5,url:'https://vnexpress.net'},
];

/* ============================== STATE ============================== */
const LS_READ='hub.read', LS_SAVED='hub.saved', LS_THEME='hub.theme';
let ARTICLES=[];
let readSet=new Set(JSON.parse(localStorage.getItem(LS_READ)||'[]'));
let savedSet=new Set(JSON.parse(localStorage.getItem(LS_SAVED)||'[]'));
const view={tab:'all', source:null, cat:null, sort:'latest', q:''};

const $=id=>document.getElementById(id);
const loader=$('loader'), toast=$('toast');
let toastTimer;
function showToast(m){toast.textContent=m;toast.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>toast.classList.remove('show'),4500);}
const byId=id=>ARTICLES.find(a=>a.id===id);

const phImg=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2.5"/><circle cx="8.5" cy="8.5" r="1.6"/><path d="M21 15l-4.5-4.5L6 21"/></svg>`;
const bmIco=on=>`<svg viewBox="0 0 24 24" fill="${on?'currentColor':'none'}" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>`;

/* ============================== DERIVE / FILTER ============================== */
function tagsOf(a){
  const t=[]; const title=a.title||'';
  for(const k of KEYWORDS){ if(title.toLowerCase().includes(k.toLowerCase())){ t.push(k); if(t.length>=2) break; } }
  return t;
}
function baseList(){ // tab scope, before source/cat/search
  let l=ARTICLES.slice();
  if(view.tab==='saved') l=l.filter(a=>savedSet.has(a.id));
  return l;
}
function filtered(){
  let l=baseList();
  if(view.source) l=l.filter(a=>a.sourceId===view.source);
  if(view.cat)    l=l.filter(a=>a.cat===view.cat);
  if(view.sort==='unread') l=l.filter(a=>!readSet.has(a.id));
  if(view.q){ const q=view.q.toLowerCase();
    l=l.filter(a=>(a.title+' '+a.summary).toLowerCase().includes(q)); }
  return l.sort((x,y)=>y.ts-x.ts);
}

/* ============================== RENDER ============================== */
function render(){ renderSources(); renderCatChips(); renderList(); renderTrending(); }

function renderSources(){
  const all=baseList();
  const unreadCount=arr=>arr.filter(a=>!readSet.has(a.id)).length;
  const present=SOURCES.filter(s=>ARTICLES.some(a=>a.sourceId===s.id));
  const nav=$('sources');
  nav.innerHTML=`
    <div class="s-group">
      <button class="s-link" data-source="" data-on="${!view.source?1:0}">
        <svg class="s-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
        <span class="s-name">Tất cả</span><span class="s-count tnum">${unreadCount(all)}</span>
      </button>
    </div>
    <div class="s-group">
      <div class="s-label" style="display:flex;justify-content:space-between;align-items:center">Nguồn
        <button class="s-manage" data-act="mgr">Quản lý</button></div>
      ${present.map(s=>{
        const arr=all.filter(a=>a.sourceId===s.id);
        return `<button class="s-link" data-source="${s.id}" data-on="${view.source===s.id?1:0}">
          <img class="s-favi" src="${faviconUrl(s)}" alt="" loading="lazy" onerror="this.style.visibility='hidden'">
          <span class="s-name">${s.label}</span><span class="s-count tnum">${unreadCount(arr)}</span>
        </button>`;}).join('')}
    </div>`;
}

function renderCatChips(){
  const present=[...new Set(baseList().map(a=>a.cat))];
  const keys=Object.keys(CAT).filter(k=>present.includes(k));
  $('catChips').innerHTML=keys.map(k=>
    `<button class="chip" data-cat="${k}" data-on="${view.cat===k?1:0}">
      <span class="c-dot" style="background:${catColor[k]}"></span>${CAT[k].label}</button>`).join('');
}

function renderList(){
  const items=filtered();
  $('feedTitle').textContent = view.tab==='saved' ? 'Đã lưu'
    : view.source ? srcById(view.source).label
    : view.cat ? CAT[view.cat].label : 'Dòng tin';
  $('feedCount').textContent = items.length ? `${items.length} tin${view.sort==='unread'?' chưa đọc':''}` : '';
  const list=$('list');
  if(!items.length){ list.innerHTML=`<div class="empty">Không có tin nào khớp bộ lọc.</div>`; return; }
  list.innerHTML=items.map(a=>{
    const s=srcById(a.sourceId);
    const tags=tagsOf(a).map(t=>`<span class="tag">#${t}</span>`).join('');
    const favi = s ? `<img class="src-favi" src="${faviconUrl(s)}" alt="" loading="lazy" onerror="this.style.visibility='hidden'">` : '';
    const thumb = a.img
      ? `<div class="row-thumb" style="background-image:url('${a.img}')"></div>`
      : `<div class="row-thumb ph">${phImg}</div>`;
    return `<article class="row ${readSet.has(a.id)?'read':''}" data-id="${a.id}">
      <span class="unread"></span>
      <div class="row-main">
        <div class="row-meta">
          ${favi}
          <span class="src-name">${s?s.label:'Nguồn'}</span>
          <span class="sep">·</span><span class="row-time">${a.time||''}</span>
        </div>
        <h3 class="row-title">${a.title}</h3>
        <p class="row-sum">${a.summary||''}</p>
        <div class="row-foot">
          <span class="tag">${CAT[a.cat].label}</span>${tags}
          <button class="row-act save ${savedSet.has(a.id)?'on':''}" data-act="save">${bmIco(savedSet.has(a.id))} Lưu</button>
          <a class="row-act" data-act="open">Mở <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 17L17 7M9 7h8v8"/></svg></a>
        </div>
      </div>
      ${thumb}
    </article>`;
  }).join('');
}

function renderTrending(){
  // featured = newest article in current tab scope
  const all=baseList().slice().sort((x,y)=>y.ts-x.ts);
  const f=all[0];
  $('featured').innerHTML = f ? `
    <div class="feat" data-id="${f.id}">
      <div class="feat-img">${phImg}</div>
      <div class="feat-body">
        <div class="feat-cat" style="color:${catColor[f.cat]}"><span class="s-dot" style="background:currentColor"></span>${CAT[f.cat].label}</div>
        <div class="feat-title">${f.title}</div>
        <div class="feat-sum">${f.summary||''}</div>
      </div>
    </div>` : `<div class="empty" style="padding:20px 4px">—</div>`;

  // topics = keyword frequency across all loaded titles (real extraction)
  const freq={};
  ARTICLES.forEach(a=>{ const tt=(a.title+' '+a.summary).toLowerCase();
    KEYWORDS.forEach(k=>{ if(tt.includes(k.toLowerCase())) freq[k]=(freq[k]||0)+1; }); });
  const top=Object.entries(freq).sort((a,b)=>b[1]-a[1]).slice(0,7);
  const max=top.length?top[0][1]:1;
  $('topics').innerHTML = top.length ? top.map(([k,n])=>`
    <div class="topic" data-q="${k}">
      <span class="t-name">#${k}</span>
      <span class="t-bar" style="width:${20+Math.round(70*n/max)}px"></span>
      <span class="t-num tnum">${n}</span>
    </div>`).join('') : `<div class="empty" style="padding:14px 4px">Chưa đủ dữ liệu</div>`;
}

/* ============================== INTERACTIONS ============================== */
function markRead(id){ if(!readSet.has(id)){ readSet.add(id); localStorage.setItem(LS_READ,JSON.stringify([...readSet])); } }
function toggleSave(id){ savedSet.has(id)?savedSet.delete(id):savedSet.add(id);
  localStorage.setItem(LS_SAVED,JSON.stringify([...savedSet])); }

function openOriginal(id){ const a=byId(id); if(!a) return; markRead(id); render(); window.open(a.url,'_blank','noopener'); }

// AI summary stub — currently condenses the RSS lead into a paragraph + key points.
// Swap this for a real LLM call (send a.title + full article text → return {lead, points}).
function aiSummarize(a){
  const text=(a.summary||'').trim();
  const sentences=text.split(/(?<=[.!?…])\s+/).map(s=>s.trim()).filter(Boolean);
  return { lead:text, points: sentences.length>1 ? sentences.slice(0,3) : [] };
}

const reader=$('reader'), readerScrim=$('readerScrim');
function closeReader(){ reader.classList.remove('open'); readerScrim.classList.remove('open'); }
const arrowSvg=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 17L17 7M9 7h8v8"/></svg>`;

const DEMO_PARAS=[
  'Đây là nội dung demo cho phần đọc toàn văn ngay trong ứng dụng. Ở bản hoàn chỉnh, phần thân bài viết gốc sẽ được trích xuất và hiển thị tại đây để bạn đọc trực tiếp mà không cần rời 7AM Hub.',
  'Trình trích xuất giữ lại các đoạn văn, tiêu đề phụ và trích dẫn quan trọng, đồng thời loại bỏ quảng cáo cùng thành phần thừa để tập trung vào nội dung chính.',
  'Để bật toàn văn ổn định cho mọi nguồn, ứng dụng nên dùng một dịch vụ readability phía máy chủ: nhận URL bài viết, tải HTML và trả về phần thân bài đã được làm sạch.'
];

// Fetch + extract the original article body through a CORS proxy; fall back to demo content.
async function loadOriginal(a, pane){
  pane.innerHTML=`<div class="art-loading"><div class="spinner"></div><p>Đang tải toàn văn…</p></div>`;
  let paras=[];
  try{
    const r=await fetch('https://api.allorigins.win/raw?url='+encodeURIComponent(a.url));
    if(r.ok){
      const html=await r.text();
      const doc=new DOMParser().parseFromString(html,'text/html');
      const nodes=[...doc.querySelectorAll('.fck_detail p, article p, p.Normal')];
      paras=[...new Set(nodes.map(n=>n.textContent.replace(/\s+/g,' ').trim()))].filter(t=>t.length>60).slice(0,14);
    }
  }catch(e){}
  const demo=!paras.length;
  if(demo) paras=[a.summary,...DEMO_PARAS].filter(Boolean);
  pane.innerHTML=`<div class="article">
    ${demo?`<div class="demo-flag">Không lấy được toàn văn trực tiếp — đang hiển thị nội dung demo.</div>`:''}
    ${paras.map(p=>`<p>${p}</p>`).join('')}
    <a class="reader-cta" href="${a.url}" target="_blank" rel="noopener">Mở trang gốc ${arrowSvg}</a>
  </div>`;
}

function openReader(id){
  const a=byId(id); if(!a) return; markRead(id); render();
  const s=srcById(a.sourceId), sum=aiSummarize(a);
  reader.dataset.id=a.id;
  reader.innerHTML=`<div class="reader-inner">
    <div class="reader-top">
      ${s?`<img class="src-favi" src="${faviconUrl(s)}" alt="" onerror="this.style.visibility='hidden'">`:''}
      <span class="src-name">${s?s.label:'Nguồn'}</span><span class="sep">·</span>
      <span class="row-time">${a.time||''}</span>
      <button class="reader-close" data-act="close" aria-label="Đóng"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
    </div>
    <h2 class="reader-title">${a.title}</h2>
    ${a.img?`<div class="reader-thumb" style="background-image:url('${a.img}')"></div>`:`<div class="reader-thumb ph">${phImg}</div>`}
    <div class="reader-tabs">
      <button class="reader-tab" data-tab="summary" data-on="1">Tóm tắt AI</button>
      <button class="reader-tab" data-tab="origin" data-on="0">Bài gốc</button>
    </div>
    <div class="reader-pane" data-pane="summary" data-on="1">
      <div class="ai-badge"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l1.9 5.6L19.5 9l-5.6 1.9L12 16l-1.9-5.1L4.5 9l5.6-1.4z"/></svg>Tóm tắt bằng AI<span class="ai-note">bản demo</span></div>
      <p class="reader-lead">${sum.lead||'—'}</p>
      ${sum.points.length?`<ul class="reader-points">${sum.points.map(p=>`<li>${p}</li>`).join('')}</ul>`:''}
    </div>
    <div class="reader-pane" data-pane="origin" data-on="0" data-loaded="0"></div>
    <div class="reader-foot">
      <button class="row-act save ${savedSet.has(a.id)?'on':''}" data-act="rsave">${bmIco(savedSet.has(a.id))} Lưu</button>
      <a class="row-act" style="margin-left:auto" href="${a.url}" target="_blank" rel="noopener">Mở bài gốc ${arrowSvg}</a>
    </div>
  </div>`;
  readerScrim.classList.add('open'); reader.classList.add('open');
}

reader.addEventListener('click',e=>{
  const tab=e.target.closest('.reader-tab');
  if(tab){ reader.querySelectorAll('.reader-tab').forEach(t=>t.dataset.on=t===tab?1:0);
    reader.querySelectorAll('.reader-pane').forEach(p=>p.dataset.on=p.dataset.pane===tab.dataset.tab?1:0);
    if(tab.dataset.tab==='origin'){
      const pane=reader.querySelector('.reader-pane[data-pane="origin"]');
      if(pane.dataset.loaded!=='1'){ pane.dataset.loaded='1'; loadOriginal(byId(reader.dataset.id),pane); }
    }
    return; }
  const act=e.target.closest('[data-act]'); if(!act) return;
  if(act.dataset.act==='close') closeReader();
  else if(act.dataset.act==='rsave'){ const id=reader.dataset.id; toggleSave(id);
    act.className='row-act save '+(savedSet.has(id)?'on':''); act.innerHTML=bmIco(savedSet.has(id))+' Lưu'; render(); }
});
readerScrim.addEventListener('click',closeReader);

/* ============================== FEED MANAGER ============================== */
const feedMgr=$('feedMgr'), mgrScrim=$('mgrScrim');
let editId=null;
const penSvg=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"/></svg>`;
const delSvg=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6M10 11v6M14 11v6"/></svg>`;

function openMgr(){ editId=null; renderMgr(); mgrScrim.classList.add('open'); feedMgr.classList.add('open'); }
function closeMgr(){ feedMgr.classList.remove('open'); mgrScrim.classList.remove('open'); }
$('footMgr').addEventListener('click',openMgr);

function renderMgr(){
  feedMgr.innerHTML=`<div class="reader-inner">
    <div class="reader-top">
      <span class="mgr-title">Quản lý nguồn</span>
      <button class="reader-close" data-mgr="close" aria-label="Đóng"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
    </div>
    <div class="mgr-list">
      ${SOURCES.length?SOURCES.map(s=>`<div class="mgr-row" data-fid="${s.id}">
        <img class="s-favi" src="${faviconUrl(s)}" alt="" loading="lazy" onerror="this.style.visibility='hidden'">
        <div class="mgr-meta"><div class="mgr-label">${s.label}</div><div class="mgr-url">${s.url}</div></div>
        <button class="mgr-act" data-mgr="edit" aria-label="Sửa">${penSvg}</button>
        <button class="mgr-act del" data-mgr="del" aria-label="Xoá">${delSvg}</button>
      </div>`).join('') : `<div class="mgr-empty">Chưa có nguồn nào. Thêm một feed RSS bên dưới.</div>`}
    </div>
    <div class="mgr-form">
      <div class="mgr-form-title" id="mgrFormTitle">${editId?'Sửa nguồn':'Thêm nguồn mới'}</div>
      <input id="mgrLabel" placeholder="Tên nguồn — vd: Tuổi Trẻ · Công nghệ">
      <input id="mgrUrl" placeholder="URL RSS — https://…">
      <p class="mgr-hint">AI sẽ tự phân loại tin từ nguồn này — không cần chọn danh mục.</p>
      <div class="mgr-form-actions">
        <button class="btn-primary" data-mgr="save">${editId?'Lưu thay đổi':'Thêm nguồn'}</button>
        <button class="mgr-cancel" data-mgr="cancel" style="${editId?'':'display:none'}">Huỷ</button>
      </div>
    </div>
  </div>`;
  if(editId){ const s=srcById(editId); if(s){
    feedMgr.querySelector('#mgrLabel').value=s.label;
    feedMgr.querySelector('#mgrUrl').value=s.url; } }
}

feedMgr.addEventListener('click',e=>{
  const b=e.target.closest('[data-mgr]'); if(!b) return;
  const act=b.dataset.mgr;
  if(act==='close'){ closeMgr(); return; }
  if(act==='cancel'){ editId=null; renderMgr(); return; }
  if(act==='edit'){ editId=b.closest('.mgr-row').dataset.fid; renderMgr(); return; }
  if(act==='del'){
    const fid=b.closest('.mgr-row').dataset.fid;
    SOURCES=SOURCES.filter(s=>s.id!==fid); saveSources();
    if(view.source===fid) view.source=null;
    if(editId===fid) editId=null;
    renderMgr(); loadFeeds(); return;
  }
  if(act==='save'){
    const label=feedMgr.querySelector('#mgrLabel').value.trim();
    let url=feedMgr.querySelector('#mgrUrl').value.trim();
    if(!label||!url){ showToast('Nhập tên nguồn và URL RSS.'); return; }
    if(!/^https?:\/\//i.test(url)) url='https://'+url;
    if(editId){ const s=srcById(editId); if(s){ s.label=label; s.url=url; } editId=null; }
    else SOURCES.push({ id:'f'+Date.now(), label, url });
    saveSources(); renderMgr(); loadFeeds(); return;
  }
});
mgrScrim.addEventListener('click',closeMgr);

document.addEventListener('keydown',e=>{ if(e.key==='Escape'){ closeReader(); closeMgr(); } });

$('list').addEventListener('click',e=>{
  const row=e.target.closest('.row'); if(!row) return;
  const id=row.dataset.id;
  const act=e.target.closest('[data-act]');
  if(act){ e.stopPropagation();
    if(act.dataset.act==='save'){ toggleSave(id); render(); }
    else if(act.dataset.act==='open'){ openOriginal(id); }
    return;
  }
  openReader(id);
});
$('featured').addEventListener('click',e=>{ const f=e.target.closest('.feat'); if(f) openReader(f.dataset.id); });
$('topics').addEventListener('click',e=>{ const t=e.target.closest('.topic'); if(!t) return;
  $('search').value=t.dataset.q; view.q=t.dataset.q; render(); });

// sources
$('sources').addEventListener('click',e=>{
  if(e.target.closest('[data-act="mgr"]')){ openMgr(); return; }
  const l=e.target.closest('.s-link'); if(!l) return;
  view.source=l.dataset.source||null; view.cat=null;
  document.querySelector('.sources').classList.remove('open');
  render();
});
// category chips
$('catChips').addEventListener('click',e=>{
  const c=e.target.closest('.chip'); if(!c) return;
  view.cat = view.cat===c.dataset.cat ? null : c.dataset.cat;
  render();
});
// sort chips
document.querySelectorAll('[data-sort]').forEach(b=>b.addEventListener('click',()=>{
  view.sort=b.dataset.sort;
  document.querySelectorAll('[data-sort]').forEach(x=>x.dataset.on=x===b?1:0);
  render();
}));
// tabs (Dòng tin / Đã lưu)
document.querySelectorAll('[data-tab]').forEach(b=>b.addEventListener('click',()=>{
  view.tab=b.dataset.tab; view.source=null; view.cat=null;
  document.querySelectorAll('[data-tab]').forEach(x=>x.dataset.on=x===b?1:0);
  render();
}));
// search
let qTimer;
$('search').addEventListener('input',e=>{ clearTimeout(qTimer);
  qTimer=setTimeout(()=>{ view.q=e.target.value.trim(); render(); },180); });
// mobile sources drawer
$('menuBtn').addEventListener('click',()=>document.querySelector('.sources').classList.toggle('open'));

// theme
function applyTheme(t){ document.documentElement.dataset.theme=t;
  document.querySelectorAll('.ic-moon').forEach(el=>el.style.display=t==='dark'?'none':'block');
  document.querySelectorAll('.ic-sun').forEach(el=>el.style.display=t==='dark'?'block':'none'); }
document.querySelectorAll('.theme-btn').forEach(b=>b.addEventListener('click',()=>{
  const t=document.documentElement.dataset.theme==='dark'?'light':'dark';
  localStorage.setItem(LS_THEME,t); applyTheme(t); }));

/* ============================== RSS LOADING ============================== */
function parseItem(item, src){
  const box=document.createElement('div'); box.innerHTML=item.description||item.content||'';
  const imgEl=box.querySelector('img');
  const img=(imgEl&&imgEl.getAttribute('src'))||item.thumbnail||(item.enclosure&&item.enclosure.link)||'';
  const text=box.textContent.replace(/\s+/g,' ').trim();
  const title=(item.title||'').trim();
  return { id:item.guid||item.link, sourceId:src.id, cat:aiClassify({title,summary:text}), img,
    title, summary:text, time:relTime(item.pubDate),
    ts:(new Date(item.pubDate)).getTime()||0, url:item.link };
}
function relTime(s){ const d=new Date(s); if(isNaN(d)) return '';
  const m=Math.max(0,Math.floor((Date.now()-d.getTime())/60000));
  if(m<1) return 'Vừa xong'; if(m<60) return `${m} phút trước`;
  const h=Math.floor(m/60); if(h<24) return `${h} giờ trước`; return `${Math.floor(h/24)} ngày trước`; }

async function loadFeeds(){
  loader.classList.add('show');
  document.querySelectorAll('.refresh-btn svg').forEach(s=>s.classList.add('spin'));
  const results=await Promise.allSettled(SOURCES.map(async src=>{
    const api='https://api.rss2json.com/v1/api.json?count=20&rss_url='+encodeURIComponent(src.url);
    const r=await fetch(api); const j=await r.json();
    if(j.status!=='ok'||!Array.isArray(j.items)) throw new Error('bad');
    return j.items.map(it=>parseItem(it,src));
  }));
  const items=results.filter(r=>r.status==='fulfilled').flatMap(r=>r.value).filter(a=>a.title);
  const failed=results.filter(r=>r.status==='rejected').length;
  if(items.length){ ARTICLES=items; }
  else { ARTICLES=SAMPLE.slice(); showToast('Không tải được RSS (CORS / giới hạn proxy). Đang hiển thị tin mẫu.'); }
  if(items.length && failed) showToast(`${failed}/${SOURCES.length} nguồn lỗi — hiển thị các nguồn còn lại.`);
  loader.classList.remove('show');
  document.querySelectorAll('.refresh-btn svg').forEach(s=>s.classList.remove('spin'));
  render();
}
document.querySelectorAll('.refresh-btn').forEach(b=>b.addEventListener('click',loadFeeds));

/* ============================== INIT ============================== */
applyTheme(localStorage.getItem(LS_THEME)||'light');
ARTICLES=SAMPLE.slice(); render();   // paint instantly
loadFeeds();                          // then pull live multi-source feed
</script>
</body>
</html>
