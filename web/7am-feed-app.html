
<!doctype html>
<html lang="vi" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>7AM Hub</title>
<!-- Claude: Georgia serif display, system-ui body, terracotta accent -->
<style>
/* ============================== TOKENS ============================== */
:root{
  --bg:#f5f4ed; --surface:#faf9f5; --fg:#141413; --muted:#5e5d59; --border:#e8e6dc;
  --topbar:#faf9f5; --chrome-fg:#141413;
  /* category colors: warm palette */
  --tech:#c96442;     --tech-lite:#d97757;
  --science:#2d7a5a;  --science-lite:#4a9a7a;
  --news:#b53333;     --news-lite:#c94444;
  --biz:#a05c20;      --biz-lite:#c47a3a;
  --world:#6b4f3a;    --world-lite:#8b6b55;
  --shadow:0 0 0 1px var(--border),0 4px 24px rgba(0,0,0,.06);
  --font:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --font-display:Georgia,"Times New Roman",serif;
}
html[data-theme="dark"]{
  --bg:#141413; --surface:#30302e; --fg:#faf9f5; --muted:#b0aea5; --border:rgba(240,238,230,.15);
  --topbar:#1e1e1c; --chrome-fg:#faf9f5;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:var(--font); background:var(--bg); color:var(--fg);
  -webkit-font-smoothing:antialiased; overflow:hidden;
  display:flex; justify-content:center; align-items:stretch;
}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
a{color:inherit;text-decoration:none}

/* ============================== APP SHELL ============================== */
.app{
  width:100%; max-width:480px; height:100dvh; position:relative;
  background:var(--bg); display:flex; flex-direction:column; overflow:hidden;
}
@media(min-width:481px){ .app{box-shadow:var(--shadow)} }

/* ----- topbar ----- */
.topbar{
  background:var(--topbar); color:var(--chrome-fg); z-index:30;
  border-bottom:1px solid var(--border); flex:0 0 auto;
  padding:max(10px,env(safe-area-inset-top)) 0 0;
}
.bar-row{display:flex;align-items:center;gap:10px;padding:8px 16px 10px}
.wordmark{font-family:var(--font-display);font-weight:600;font-size:20px;letter-spacing:-.02em;display:flex;align-items:baseline;gap:7px}
.wordmark .am{color:#c96442}
.date{font-size:12px;color:var(--muted);font-weight:500;margin-left:2px}
.bar-spacer{flex:1}
.icon-btn{
  width:40px;height:40px;border-radius:50%;display:grid;place-items:center;
  color:var(--chrome-fg); position:relative; transition:background .15s;
}
.icon-btn:hover{background:color-mix(in srgb,var(--chrome-fg) 9%,transparent)}
.icon-btn svg{width:22px;height:22px}
.badge{
  position:absolute;top:4px;right:4px;min-width:16px;height:16px;padding:0 4px;
  background:#c96442;color:#fff;border-radius:9px;font-size:10px;font-weight:700;
  display:none;place-items:center;line-height:16px;
}
.badge.show{display:grid}

/* ----- chips ----- */
.chips{display:flex;gap:8px;overflow-x:auto;padding:0 16px 12px;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{
  flex:0 0 auto;padding:7px 15px;border-radius:999px;font-size:13.5px;font-weight:600;
  background:color-mix(in srgb,var(--chrome-fg) 7%,transparent);color:var(--chrome-fg);
  white-space:nowrap;transition:all .15s;border:1px solid transparent;
}
.chip[data-on="1"]{background:var(--chrome-fg);color:var(--topbar)}

/* ============================== FEED ============================== */
.feed{
  flex:1;overflow-y:auto;scroll-snap-type:y mandatory;scroll-behavior:smooth;
  scrollbar-width:none;position:relative;
}
.feed::-webkit-scrollbar{display:none}

.card{
  height:100%;scroll-snap-align:start;scroll-snap-stop:always;
  display:flex;flex-direction:column;padding:12px;
}
.card-inner{
  flex:1;display:flex;flex-direction:column;border-radius:22px;overflow:hidden;
  background:var(--surface);box-shadow:var(--shadow);cursor:pointer;
}
.card-media{
  width:100%;aspect-ratio:5/3;background-size:cover;background-position:center;
  background-repeat:no-repeat;background-color:#141413;position:relative;flex:0 0 auto;
}
/* image placeholder (used until real images are turned on) */
.card-media.ph{
  display:grid;place-items:center;background:
    repeating-linear-gradient(45deg,
      color-mix(in srgb,var(--fg) 5%,var(--surface)) 0 14px,
      color-mix(in srgb,var(--fg) 9%,var(--surface)) 14px 28px);
}
.ph-glyph{width:46px;height:46px;color:color-mix(in srgb,var(--fg) 26%,transparent)}
.pill{
  position:absolute;top:14px;left:14px;padding:6px 13px;border-radius:999px;
  font-size:12px;font-weight:700;color:#fff;letter-spacing:.01em;
  box-shadow:0 2px 10px rgba(0,0,0,.25);backdrop-filter:saturate(1.2);
}
.bm{
  position:absolute;top:11px;right:11px;width:42px;height:42px;border-radius:50%;
  background:rgba(12,14,19,.42);display:grid;place-items:center;backdrop-filter:blur(8px);
}
.bm svg{width:22px;height:22px;color:#fff;transition:transform .15s}
.bm:active svg{transform:scale(.82)}
.bm[data-saved="1"] svg{color:#d4a84b;fill:#d4a84b}

.card-body{
  flex:1;display:flex;flex-direction:column;padding:22px 22px 20px;color:#fff;min-height:0;
}
.headline{
  font-family:var(--font-display);font-size:clamp(22px,6.2vw,30px);line-height:1.16;
  font-weight:600;letter-spacing:-.01em;text-wrap:balance;
}
.summary{
  margin-top:14px;font-size:clamp(14.5px,4vw,16.5px);line-height:1.52;font-weight:400;
  color:rgba(255,255,255,.9);text-wrap:pretty;overflow:hidden;
}
.foot{
  margin-top:auto;padding-top:18px;display:flex;align-items:center;gap:12px;
  border-top:1px solid rgba(255,255,255,.18);
}
.src{font-size:12.5px;font-weight:500;color:rgba(255,255,255,.78);flex:1;min-width:0;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.read{
  font-size:13.5px;font-weight:700;display:flex;align-items:center;gap:5px;
  padding:8px 14px;border-radius:999px;background:rgba(255,255,255,.16);white-space:nowrap;
}
.read svg{width:15px;height:15px}

/* category panel bg */
.card[data-cat="tech"]    .card-body{background:var(--tech)}
.card[data-cat="science"] .card-body{background:var(--science)}
.card[data-cat="news"]    .card-body{background:var(--news)}
.card[data-cat="biz"]     .card-body{background:var(--biz)}
.card[data-cat="world"]   .card-body{background:var(--world)}
.card[data-cat="tech"]    .pill{background:var(--tech-lite)}
.card[data-cat="science"] .pill{background:var(--science-lite)}
.card[data-cat="news"]    .pill{background:var(--news-lite)}
.card[data-cat="biz"]     .pill{background:var(--biz-lite)}
.card[data-cat="world"]   .pill{background:var(--world-lite)}

/* ----- position rail ----- */
.rail{
  position:absolute;right:7px;top:50%;transform:translateY(-50%);z-index:20;
  display:flex;flex-direction:column;gap:7px;pointer-events:none;
}
.rail .dot{width:5px;height:5px;border-radius:50%;background:color-mix(in srgb,var(--fg) 30%,transparent);transition:all .25s}
.rail .dot.on{height:18px;background:#c96442}

/* ----- swipe hint ----- */
.hint{
  position:absolute;left:50%;bottom:24px;transform:translateX(-50%);z-index:15;
  display:flex;flex-direction:column;align-items:center;gap:3px;color:rgba(255,255,255,.9);
  font-size:11px;font-weight:600;pointer-events:none;animation:bob 1.6s ease-in-out infinite;
}
.hint svg{width:20px;height:20px}
@keyframes bob{0%,100%{transform:translate(-50%,0)}50%{transform:translate(-50%,7px)}}
.feed.scrolled .hint{opacity:0;transition:opacity .4s}

/* ============================== SAVED SHEET ============================== */
.scrim{position:absolute;inset:0;background:rgba(7,8,9,.5);opacity:0;visibility:hidden;
  transition:.25s;z-index:40}
.scrim.open{opacity:1;visibility:visible}
.sheet{
  position:absolute;left:0;right:0;bottom:0;z-index:50;background:var(--surface);
  border-radius:22px 22px 0 0;transform:translateY(100%);transition:transform .3s cubic-bezier(.32,.72,0,1);
  max-height:78%;display:flex;flex-direction:column;padding-bottom:env(safe-area-inset-bottom);
}
.sheet.open{transform:translateY(0)}
.sheet-grab{width:40px;height:4px;border-radius:4px;background:var(--border);margin:10px auto 4px}
.sheet-head{display:flex;align-items:center;justify-content:space-between;padding:8px 20px 12px}
.sheet-head h3{font-family:var(--font-display);font-size:18px;font-weight:600}
.sheet-head button{font-size:14px;font-weight:600;color:var(--muted)}
.saved-list{overflow-y:auto;padding:0 14px 18px}
.saved-row{display:flex;gap:12px;padding:11px;border-radius:14px;align-items:center}
.saved-row:hover{background:color-mix(in srgb,var(--fg) 5%,transparent)}
.saved-thumb{width:62px;height:48px;border-radius:9px;background-size:cover;
  background-position:center;background-color:#141413;flex:0 0 auto}
.saved-thumb.ph{display:grid;place-items:center;background:color-mix(in srgb,var(--fg) 8%,var(--surface))}
.saved-thumb.ph .ph-glyph{width:22px;height:22px}
.saved-meta{flex:1;min-width:0}
.saved-meta .t{font-size:14px;font-weight:700;line-height:1.3;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.saved-meta .c{font-size:11.5px;color:var(--muted);font-weight:600;margin-top:3px}
.saved-del{width:34px;height:34px;border-radius:50%;display:grid;place-items:center;color:var(--muted)}
.saved-del svg{width:18px;height:18px}
.empty{padding:40px 24px 48px;text-align:center;color:var(--muted)}
.empty svg{width:42px;height:42px;opacity:.4;margin-bottom:10px}
.empty p{font-size:14px;line-height:1.5}

/* ----- loading + error status ----- */
.loader{
  position:absolute;inset:0;z-index:25;display:none;flex-direction:column;
  align-items:center;justify-content:center;gap:16px;background:var(--bg);color:var(--muted);
}
.loader.show{display:flex}
.spinner{width:34px;height:34px;border-radius:50%;border:3px solid var(--border);
  border-top-color:#c96442;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loader p{font-size:13.5px;font-weight:600}
.toast{
  position:absolute;left:50%;bottom:max(20px,env(safe-area-inset-bottom));transform:translateX(-50%);
  z-index:60;max-width:88%;background:#141413;color:#faf9f5;padding:11px 16px;border-radius:12px;
  font-size:12.5px;font-weight:500;line-height:1.4;box-shadow:0 8px 24px rgba(0,0,0,.3);
  opacity:0;visibility:hidden;transition:.3s;text-align:center;
}
.toast.show{opacity:1;visibility:visible}
.refresh-spin{animation:spin .8s linear infinite}

/* ============================== DESKTOP LAYOUT (≥1024px) ============================== */
.side,.queue{display:none}
@media(min-width:1024px){
  .app{
    max-width:1320px;height:100dvh;display:grid;box-shadow:var(--shadow);
    grid-template-columns:268px minmax(0,1fr) 344px;grid-template-rows:100dvh;
  }
  .topbar,.rail{display:none}

  /* left sidebar */
  .side{display:flex;grid-column:1;flex-direction:column;padding:24px 18px;
    background:var(--topbar);border-right:1px solid var(--border)}
  .side .wordmark{font-family:var(--font-display);font-size:22px;padding:4px 10px 18px}
  .side-nav{display:flex;flex-direction:column;gap:2px}
  .side-link{display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:11px;
    font-size:14.5px;font-weight:600;color:var(--muted);text-align:left;width:100%;transition:.15s}
  .side-link:hover{background:color-mix(in srgb,var(--chrome-fg) 7%,transparent);color:var(--chrome-fg)}
  .side-link[data-on="1"]{background:color-mix(in srgb,var(--chrome-fg) 10%,transparent);color:var(--chrome-fg)}
  .side-dot{width:9px;height:9px;border-radius:50%;flex:0 0 auto}
  .side-foot{margin-top:auto;display:flex;gap:6px;padding-top:16px;border-top:1px solid var(--border)}

  /* center feed — vertical card (ảnh trên, nội dung dưới) */
  .feed{grid-column:2}
  .card{padding:20px 34px}
  .card-inner{flex-direction:column}
  .card-media{width:100%;aspect-ratio:16/9;height:auto;align-self:auto}
  .card-body{justify-content:flex-start;padding:28px 32px 26px}
  .headline{font-size:clamp(24px,2.2vw,36px);line-height:1.12;font-weight:600}
  .summary{font-size:16.5px;margin-top:14px;line-height:1.58}
  .foot{padding-top:20px}
  .src{font-size:13px}

  /* right up-next queue */
  .queue{display:flex;grid-column:3;flex-direction:column;
    background:var(--topbar);border-left:1px solid var(--border)}
  .queue-head{padding:24px 22px 12px;font-size:12px;font-weight:700;letter-spacing:.06em;
    text-transform:uppercase;color:var(--muted)}
  .queue-list{flex:1;overflow-y:auto;padding:0 12px 18px;scrollbar-width:none}
  .queue-list::-webkit-scrollbar{display:none}
  .q-item{display:flex;gap:12px;padding:11px;border-radius:13px;cursor:pointer;align-items:flex-start;transition:.15s}
  .q-item:hover{background:color-mix(in srgb,var(--fg) 5%,transparent)}
  .q-item[data-on="1"]{background:color-mix(in srgb,var(--fg) 9%,transparent)}
  .q-thumb{width:62px;height:48px;border-radius:8px;flex:0 0 auto;display:grid;place-items:center;
    background:color-mix(in srgb,var(--fg) 8%,var(--surface))}
  .q-thumb .ph-glyph{width:20px;height:20px}
  .q-meta{min-width:0;flex:1}
  .q-cat{font-size:11px;font-weight:700;margin-bottom:4px;display:flex;align-items:center;gap:6px}
  .q-title{font-size:13.5px;font-weight:600;line-height:1.34;color:var(--fg);
    display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
}
</style>
</head>
<body>
<div class="app">

  <header class="topbar">
    <div class="bar-row">
      <div class="wordmark"><span>7<span class="am">AM</span></span> Hub</div>
      <span class="date" id="date"></span>
      <span class="bar-spacer"></span>
      <button class="icon-btn refresh-btn" aria-label="Tải lại tin">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-2.64-6.36M21 3v6h-6"/></svg>
      </button>
      <button class="icon-btn saved-btn" aria-label="Đã lưu">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
        <span class="badge save-badge">0</span>
      </button>
      <button class="icon-btn theme-btn" aria-label="Đổi giao diện">
        <svg class="ic-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        <svg class="ic-sun" style="display:none" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4.5"/><path d="M12 1v3M12 20v3M4.2 4.2l2.1 2.1M17.7 17.7l2.1 2.1M1 12h3M20 12h3M4.2 19.8l2.1-2.1M17.7 6.3l2.1-2.1"/></svg>
      </button>
    </div>
    <nav class="chips" id="chips"></nav>
  </header>

  <!-- desktop sidebar (left rail, ≥1024px) -->
  <aside class="side">
    <div class="wordmark"><span>7<span class="am">AM</span></span> Hub</div>
    <nav class="side-nav" id="sideNav"></nav>
    <div class="side-foot">
      <button class="icon-btn refresh-btn" aria-label="Tải lại tin">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-2.64-6.36M21 3v6h-6"/></svg>
      </button>
      <button class="icon-btn saved-btn" aria-label="Đã lưu">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
        <span class="badge save-badge">0</span>
      </button>
      <button class="icon-btn theme-btn" aria-label="Đổi giao diện">
        <svg class="ic-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        <svg class="ic-sun" style="display:none" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4.5"/><path d="M12 1v3M12 20v3M4.2 4.2l2.1 2.1M17.7 17.7l2.1 2.1M1 12h3M20 12h3M4.2 19.8l2.1-2.1M17.7 6.3l2.1-2.1"/></svg>
      </button>
    </div>
  </aside>

  <main class="feed" id="feed"></main>
  <div class="rail" id="rail"></div>

  <!-- desktop up-next queue (right rail, ≥1024px) -->
  <aside class="queue">
    <div class="queue-head">Tiếp theo</div>
    <div class="queue-list" id="queueList"></div>
  </aside>

  <div class="loader" id="loader"><div class="spinner"></div><p>Đang tải tin mới…</p></div>
  <div class="toast" id="toast"></div>

  <!-- saved sheet -->
  <div class="scrim" id="scrim"></div>
  <section class="sheet" id="sheet" aria-label="Tin đã lưu">
    <div class="sheet-grab"></div>
    <div class="sheet-head"><h3>Đã lưu</h3><button id="sheetClose">Đóng</button></div>
    <div class="saved-list" id="savedList"></div>
  </section>

</div>

<script>
/* ============================== DATA ==============================
   loadFeed() lấy tin từ backend (/api/articles) — server đã fetch RSS, phân loại
   + tóm tắt bằng AI. Các card mẫu bên dưới chỉ là fallback offline khi mất kết nối.
   Quản lý nguồn RSS thực hiện ở giao diện desktop (news-hub). */
const API_BASE = location.protocol.startsWith('http') ? '' : 'http://localhost:8787';

const CAT = {
  all:     {label:'Tất cả'},
  world:   {label:'Thế giới'},
  tech:    {label:'Công nghệ'},
  science: {label:'Khoa học'},
  news:    {label:'Thời sự'},
  biz:     {label:'Kinh doanh'},
};

const ARTICLES = [

    summary:"Trung Quốc được đánh giá đang thay đổi chiến lược từ ứng dụng AI đơn thuần sang AGI và siêu ứng dụng với nguồn nhân tài thu hút từ Mỹ.",
    source:'vnexpress.net', time:'2 giờ trước', url:'https://vnexpress.net' },
  { id:'a2', cat:'tech', img:'mqcenmwg-IMG_0933.JPG',
    title:"Nhà sáng lập NotebookLM: 'AI để cùng động não, không phải để viết thay'",
    summary:"Steven Johnson, nhà đồng sáng lập NotebookLM, cho rằng AI phải thấu hiểu phong cách, thế giới quan của cá nhân để hỗ trợ, thay vì tạo ra những nội dung rập khuôn.",
    source:'vnexpress.net', time:'3 giờ trước', url:'https://vnexpress.net' },
  { id:'a3', cat:'tech', img:'mqcenmwi-IMG_0934.JPG',
    title:"Thế Giới Di Động hợp tác iCallme cảnh báo cuộc gọi lừa đảo",
    summary:"Thế Giới Di Động và iCallme triển khai giải pháp cảnh báo cuộc gọi lừa đảo, hỗ trợ người dùng nhận diện rủi ro, tránh mắc bẫy tài chính.",
    source:'vnexpress.net', time:'5 giờ trước', url:'https://vnexpress.net' },
  { id:'a4', cat:'science', img:'mqcenmwi-IMG_0935.JPG',
    title:"Nhà khoa học Harvard muốn thử nghiệm thuốc 'cải lão hoàn đồng'",
    summary:"Nhà khoa học David Sinclair dự định thử nghiệm thuốc trẻ hóa toàn thân dựa trên công nghệ tái lập trình hóa học trong cuộc thi do Quỹ XPrize tổ chức.",
    source:'vnexpress.net', time:'7 giờ trước', url:'https://vnexpress.net' },
  { id:'a5', cat:'news', img:'mqcenmwj-IMG_0936.JPG',
    title:"Đề xuất thanh tra đột xuất cơ sở thực phẩm không cần báo trước",
    summary:"Bộ Công an đề xuất cho phép cơ quan chức năng thanh tra không báo trước, phong tỏa kho bãi và thu hồi sản phẩm trong vòng 24 giờ khi phát hiện nguy cơ mất an toàn thực phẩm.",
    source:'vnexpress.net', time:'9 giờ trước', url:'https://vnexpress.net' },
  { id:'a6', cat:'biz', img:'mqcenmwl-IMG_0937.JPG',
    title:"UOB: Nền kinh tế Việt Nam 'bền bỉ'",
    summary:"Kinh tế Việt Nam bền bỉ trước áp lực chi phí và những căng thẳng bên ngoài, với triển vọng ngắn hạn tích cực đan xen thách thức, theo UOB.",
    source:'vnexpress.net', time:'11 giờ trước', url:'https://vnexpress.net' },
];

/* ============================== STATE ============================== */
const LS_SAVED='7am.saved', LS_THEME='7am.theme';
let saved = new Set(JSON.parse(localStorage.getItem(LS_SAVED) || '[]'));
let filter = 'all';
let DIGEST = null;   // bản tin "Đề xuất 7AM" từ /api/digest/today

const feed   = document.getElementById('feed');
const rail   = document.getElementById('rail');
const chips  = document.getElementById('chips');
const byId   = id => ARTICLES.find(a=>a.id===id);

/* ---------- icons ---------- */
const bmIcon = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>`;
const arrowIcon = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 17L17 7M9 7h8v8"/></svg>`;
const phGlyph = `<svg class="ph-glyph" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2.5"/><circle cx="8.5" cy="8.5" r="1.6"/><path d="M21 15l-4.5-4.5L6 21"/></svg>`;
const catColor = {world:'var(--world)',tech:'var(--tech)',science:'var(--science)',news:'var(--news)',biz:'var(--biz)'};

/* ============================== RENDER ============================== */
function digestPicks(){ return (DIGEST && DIGEST.picks) ? DIGEST.picks : []; }

function visibleArticles(){
  if(filter==='digest') return digestPicks();
  return filter==='all' ? ARTICLES : ARTICLES.filter(a=>a.cat===filter);
}

// categories actually present in the loaded feed, in registry order
function activeCatKeys(){
  const present=[...new Set(ARTICLES.map(a=>a.cat))];
  return ['all', ...Object.keys(CAT).filter(k=>k!=='all' && present.includes(k))];
}

function renderChips(){
  const digestChip = digestPicks().length
    ? `<button class="chip" data-cat="digest" data-on="${filter==='digest'?1:0}">🔥 7AM</button>` : '';
  chips.innerHTML = digestChip + activeCatKeys().map(k=>
    `<button class="chip" data-cat="${k}" data-on="${k===filter?1:0}">${CAT[k].label}</button>`).join('');
}

// desktop left-rail category nav (mirrors the mobile chips)
function renderSideNav(){
  const nav=document.getElementById('sideNav');
  nav.innerHTML = activeCatKeys().map(k=>`
    <button class="side-link" data-cat="${k}" data-on="${k===filter?1:0}">
      <span class="side-dot" style="background:${k==='all'?'var(--muted)':catColor[k]}"></span>${CAT[k].label}
    </button>`).join('');
}

// desktop right-rail "up next" queue
function renderQueue(){
  const list=document.getElementById('queueList');
  list.innerHTML = visibleArticles().map(a=>`
    <div class="q-item" data-id="${a.id}">
      <div class="q-thumb">${phGlyph}</div>
      <div class="q-meta">
        <div class="q-cat" style="color:${catColor[a.cat]||'var(--muted)'}"><span class="side-dot" style="background:currentColor"></span>${CAT[a.cat]?.label||''}</div>
        <div class="q-title">${a.title}</div>
      </div>
    </div>`).join('');
}

// single source of truth for category filtering (chips + side nav)
function setFilter(cat){
  filter=cat;
  renderChips(); renderSideNav(); renderFeed();
  feed.scrollTo({top:0});
}

function renderFeed(){
  const items = visibleArticles();
  feed.innerHTML = items.map((a,i)=>`
    <article class="card" data-cat="${a.cat}" data-id="${a.id}">
      <div class="card-inner" data-act="open">
        <div class="card-media${a.img?'':' ph'}"${a.img?` style="background-image:url('${a.img}')"`:''}>
          ${a.img?'':phGlyph}
          ${a.cat&&CAT[a.cat]?`<span class="pill">${CAT[a.cat].label}</span>`:''}
          <button class="bm" data-act="save" data-saved="${saved.has(a.id)?1:0}" aria-label="Lưu bài">${bmIcon}</button>
          ${i===0 ? `<div class="hint">${'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M6 13l6 6 6-6"/></svg>'}<span>Vuốt lên</span></div>`:''}
        </div>
        <div class="card-body">
          <h2 class="headline">${a.title}</h2>
          <p class="summary">${a.summary}</p>
          <div class="foot">
            <span class="src">${a.source} · ${a.time}</span>
            <span class="read">Đọc bài ${arrowIcon}</span>
          </div>
        </div>
      </div>
    </article>`).join('');
  rail.innerHTML = items.map((_,i)=>`<span class="dot${i===0?' on':''}"></span>`).join('');
  renderQueue();
  feed.classList.remove('scrolled');
  observeCards();
}

/* ============================== INTERACTIONS ============================== */
// open original / bookmark (event delegation)
feed.addEventListener('click', e=>{
  const card = e.target.closest('.card'); if(!card) return;
  const id = card.dataset.id;
  if(e.target.closest('[data-act="save"]')){
    e.stopPropagation();
    toggleSave(id);
    const btn = card.querySelector('.bm');
    btn.dataset.saved = saved.has(id)?1:0;
    return;
  }
  if(e.target.closest('[data-act="open"]')){
    window.open(byId(id).url,'_blank','noopener');
  }
});

function toggleSave(id){
  saved.has(id) ? saved.delete(id) : saved.add(id);
  localStorage.setItem(LS_SAVED, JSON.stringify([...saved]));
  updateBadge();
}

function updateBadge(){
  document.querySelectorAll('.save-badge').forEach(b=>{
    b.textContent=saved.size;
    b.classList.toggle('show', saved.size>0);
  });
}

// chips filter (mobile) + side nav (desktop)
chips.addEventListener('click', e=>{
  const c = e.target.closest('.chip'); if(c) setFilter(c.dataset.cat);
});
document.getElementById('sideNav').addEventListener('click', e=>{
  const c = e.target.closest('.side-link'); if(c) setFilter(c.dataset.cat);
});

// up-next queue → jump to that card
document.getElementById('queueList').addEventListener('click', e=>{
  const item = e.target.closest('.q-item'); if(!item) return;
  const target = feed.querySelector(`.card[data-id="${item.dataset.id}"]`);
  if(target) feed.scrollTo({top:target.offsetTop,behavior:'smooth'});
});

// keyboard nav (desktop) — ↑/↓ or j/k move one card
document.addEventListener('keydown', e=>{
  if(!['ArrowDown','ArrowUp','j','k'].includes(e.key)) return;
  const cards=[...feed.querySelectorAll('.card')]; if(!cards.length) return;
  const h=feed.clientHeight||1;
  const cur=Math.round(feed.scrollTop/h);
  const dir=(e.key==='ArrowDown'||e.key==='j')?1:-1;
  const t=cards[Math.max(0,Math.min(cards.length-1,cur+dir))];
  if(t){ e.preventDefault(); feed.scrollTo({top:t.offsetTop,behavior:'smooth'}); }
});

// rail / scroll position
let observer;
function observeCards(){
  if(observer) observer.disconnect();
  const cards=[...feed.querySelectorAll('.card')];
  const dots=[...rail.querySelectorAll('.dot')];
  observer=new IntersectionObserver(ents=>{
    ents.forEach(ent=>{
      if(ent.isIntersecting){
        const i=cards.indexOf(ent.target);
        dots.forEach((d,j)=>d.classList.toggle('on', j===i));
        const qs=[...document.querySelectorAll('#queueList .q-item')];
        qs.forEach((q,j)=>{ q.dataset.on = j===i?1:0; });
      }
    });
  },{root:feed,threshold:.6});
  cards.forEach(c=>observer.observe(c));
}
feed.addEventListener('scroll',()=>{ if(feed.scrollTop>40) feed.classList.add('scrolled'); },{passive:true});

// theme
function applyTheme(t){
  document.documentElement.dataset.theme=t;
  document.querySelectorAll('.ic-moon').forEach(el=>el.style.display=t==='dark'?'none':'block');
  document.querySelectorAll('.ic-sun').forEach(el=>el.style.display=t==='dark'?'block':'none');
}
document.querySelectorAll('.theme-btn').forEach(btn=>btn.addEventListener('click',()=>{
  const t = document.documentElement.dataset.theme==='dark'?'light':'dark';
  localStorage.setItem(LS_THEME,t); applyTheme(t);
}));

// saved sheet
const sheet=document.getElementById('sheet'), scrim=document.getElementById('scrim');
function openSheet(){ renderSaved(); sheet.classList.add('open'); scrim.classList.add('open'); }
function closeSheet(){ sheet.classList.remove('open'); scrim.classList.remove('open'); }
document.querySelectorAll('.saved-btn').forEach(b=>b.addEventListener('click',openSheet));
document.getElementById('sheetClose').addEventListener('click',closeSheet);
scrim.addEventListener('click',closeSheet);

function renderSaved(){
  const list=document.getElementById('savedList');
  const items=ARTICLES.filter(a=>saved.has(a.id));
  if(!items.length){
    list.innerHTML=`<div class="empty">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
      <p>Chưa có tin nào được lưu.<br>Chạm biểu tượng dấu trang trên mỗi tin để lưu lại.</p></div>`;
    return;
  }
  list.innerHTML=items.map(a=>`
    <div class="saved-row" data-id="${a.id}">
      <div class="saved-thumb ph" data-go>${phGlyph}</div>
      <div class="saved-meta" data-go>
        <div class="t">${a.title}</div>
        <div class="c">${CAT[a.cat].label} · ${a.source}</div>
      </div>
      <button class="saved-del" aria-label="Bỏ lưu"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
    </div>`).join('');
}
document.getElementById('savedList').addEventListener('click',e=>{
  const row=e.target.closest('.saved-row'); if(!row) return;
  const id=row.dataset.id;
  if(e.target.closest('.saved-del')){
    toggleSave(id); renderSaved();
    feed.querySelectorAll(`.card[data-id="${id}"] .bm`).forEach(b=>b.dataset.saved=0);
    return;
  }
  if(e.target.closest('[data-go]')){
    closeSheet();
    if(filter!=='all' && byId(id).cat!==filter){ filter='all'; renderChips(); renderFeed(); }
    const target=feed.querySelector(`.card[data-id="${id}"]`);
    if(target) setTimeout(()=>feed.scrollTo({top:target.offsetTop,behavior:'smooth'}),60);
  }
});

/* ============================== TẢI TIN TỪ BACKEND ============================== */
const loader=document.getElementById('loader');
const toast=document.getElementById('toast');
let toastTimer;

function showToast(msg){
  toast.textContent=msg; toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>toast.classList.remove('show'),4200);
}

async function loadDigest(){
  try{ const r=await fetch(API_BASE+'/api/digest/today'); DIGEST=await r.json(); }
  catch(e){ DIGEST=null; }
}

// Lấy tin đã được backend phân loại + tóm tắt bằng AI.
async function loadFeed(){
  loader.classList.add('show');
  document.querySelectorAll('.refresh-btn svg').forEach(s=>s.classList.add('refresh-spin'));
  try{
    const r=await fetch(API_BASE+'/api/articles?limit=60&sort=latest');
    const j=await r.json();
    const items=(j.items||[]).filter(a=>a.title);
    await loadDigest();
    if(items.length){
      ARTICLES.length=0; ARTICLES.push(...items);
      if(filter!=='digest') filter='all';
    } else {
      showToast('Chưa có tin — server đang fetch RSS & xử lý AI. Thử tải lại sau giây lát.');
    }
  }catch(e){
    showToast('Không kết nối được server. Đang hiển thị tin mẫu.');
  }finally{
    loader.classList.remove('show');
    document.querySelectorAll('.refresh-btn svg').forEach(s=>s.classList.remove('refresh-spin'));
    renderChips(); renderSideNav(); renderFeed(); feed.scrollTo({top:0});
  }
}
// Nút tải lại: yêu cầu server fetch RSS + xử lý AI ngay, rồi nạp lại.
async function refreshNow(){
  document.querySelectorAll('.refresh-btn svg').forEach(s=>s.classList.add('refresh-spin'));
  try{ await fetch(API_BASE+'/api/refresh',{method:'POST'}); }catch(e){}
  await loadFeed();
}
document.querySelectorAll('.refresh-btn').forEach(b=>b.addEventListener('click',refreshNow));

/* ============================== INIT ============================== */
function initDate(){
  const d=new Date();
  const days=['Chủ nhật','Thứ hai','Thứ ba','Thứ tư','Thứ năm','Thứ sáu','Thứ bảy'];
  document.getElementById('date').textContent =
    `${days[d.getDay()]}, ${String(d.getDate()).padStart(2,'0')}.${String(d.getMonth()+1).padStart(2,'0')}`;
}

applyTheme(localStorage.getItem(LS_THEME) || 'light');
initDate();
renderChips();
renderSideNav();
renderFeed();   // paint sample cards immediately (also fills the desktop queue)
updateBadge();
loadFeed();     // then swap in the live VnExpress feed
</script>
</body>
</html>
